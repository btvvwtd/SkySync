<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkySync</title>
  <link rel="stylesheet" href="/static/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <!-- Auth block -->
    <div id="auth-container">
      <h1 id="auth-title">Login to SkySync</h1>

      <form id="auth-form" novalidate>
        <input type="text" id="username" placeholder="Username" required>
        <input type="email" id="email" placeholder="Email" style="display: none;">
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" id="auth-submit">Login</button>
      </form>

      <p id="login-error" style="color: red; display: none;"></p>
      <p id="switch-auth">
        Don't have an account?
        <a href="#" id="toggle-auth">Sign Up</a>
      </p>
    </div>

    <!-- File view block -->
    <div id="upload-container" style="display: none;">
      <h1>Welcome, <span id="user-name"></span>!</h1>
      <h2>Your Cloud Storage</h2>

      <div class="upload-area" onclick="document.getElementById('file-input').click()">
        <p>Drag & drop files here or click to browse</p>
        <span>Supports: images, documents, audio, video</span>
      </div>
      <input type="file" id="file-input" multiple>
      <button id="upload-button">Upload File</button>

      <h2>Your Files</h2>
      <ul id="fileList"></ul>

      <button class="logout-btn" id="logout-button">Logout</button>
    </div>
  </div>

  <script src="/static/code/auth.js"></script>
  <script src="/static/code/files.js"></script>
</body>
</html>
