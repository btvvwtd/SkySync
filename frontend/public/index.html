<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkySync</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Блок авторизації -->
        <div id="auth-container">
            <h1>Login to SkySync</h1>
            <form id="login-form">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <p id="login-error" style="color: red; display: none;">Invalid credentials. Please try again.</p>
        </div>

        <!-- Блок для перегляду файлів -->
        <div id="upload-container" style="display: none;">
            <h1>Welcome, <span id="user-name"></span>!</h1>
            <h2>Your Cloud Storage</h2>

            <div class="upload-area" onclick="document.getElementById('file-input').click()">
                <p>Drag & drop files here or click to browse</p>
                <span>Supports: images, documents, audio, video</span>
            </div>
            <input type="file" id="file-input">
            <button id="upload-button" onclick="uploadFile()">Upload File</button>

            <h2>Your Files</h2>
            <ul id="fileList"></ul>

            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
